name: CI

on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend - install (only if backend folder exists)
        shell: bash
        run: |
          set -e
          if [ -d "backend-nexus" ]; then
            cd backend-nexus
          elif [ -d "backend" ]; then
            cd backend
          else
            echo "No backend folder found. Skipping backend job."
            exit 0
          fi

          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" || pip install -e .; fi

      - name: Backend - lint/tests (optional)
        shell: bash
        run: |
          set -e
          if [ -d "backend-nexus" ]; then
            cd backend-nexus
          elif [ -d "backend" ]; then
            cd backend
          else
            echo "No backend folder found. Skipping."
            exit 0
          fi

          if command -v ruff >/dev/null 2>&1; then
            ruff check .
            ruff format --check .
          else
            echo "ruff not installed - skipping"
          fi

          if command -v pytest >/dev/null 2>&1; then
            pytest -q
          else
            echo "pytest not installed - skipping"
          fi

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-nexus

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-nexus/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Tests
        run: npm test --if-present -- --watch=false

      - name: Build
        run: npm run build --if-present

