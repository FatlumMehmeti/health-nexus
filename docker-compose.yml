services:
  db:
    image: postgres:16
    container_name: health_db
    restart: always
    env_file: .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./backend-nexus
    container_name: health_api
    env_file: .env
    volumes:
      - ./backend-nexus:/app
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

volumes:
  postgres_data:
